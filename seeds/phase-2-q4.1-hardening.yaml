ontology_schema:
  name: "Q41HardeningCycle"
  description: "Workflow for landing the four Q4.1 hardening ACs (parent-only QA docs, MCP execution_mode_required honoring, QA-pending sentinel resume + audit-diff, deferred CodeRabbit + Run Summary observability) into Ouroboros's serial-compounding executor without regressing any Phase-1.5 / Q2 / Q3 / Q4 invariants."
  fields:
    - name: "ACPostmortem.qa_status"
      field_type: "field"
      description: "level_context.py:607 — extended enum value 'pending' added; rest unchanged"
    - name: "ACPostmortem.final_message"
      field_type: "field"
      description: "level_context.py — NEW field, str | None default None; populated from result.final_message during normal flow and on phase-1 checkpoint write"
    - name: "SeedMetadata.execution_mode_required"
      field_type: "field"
      description: "core/seed.py:136 — NEW field, Literal['parallel','compounding'] | None default None"
    - name: "_write_compounding_checkpoint"
      field_type: "service"
      description: "serial_executor.py:466 — UNCHANGED API; called twice per AC under inline_qa (phase-1 pending, phase-2 terminal); CheckpointStore.save() overwrites by seed_id"
    - name: "run_inline_qa"
      field_type: "service"
      description: "inline_qa.py:214 — UNCHANGED API; called by both the normal QA loop and the AC-3 resume QA-replay branch"
    - name: "_mode_conflict_counter"
      field_type: "state"
      description: "execution_handlers.py — NEW module-level dict[str, int]; incremented at AC-2 conflict-warning site, drained by AC-4 at end-of-run"
    - name: "_SOFT_FLIP_WARNED_THIS_SESSION"
      field_type: "state"
      description: "execution_handlers.py — NEW module-level bool; guards the soft-flip deprecation warning so it fires at most once per process"
    - name: "create_mode_conflict_event"
      field_type: "service"
      description: "events.py — NEW factory; emits 'mcp.execute_seed.mode_conflict' event with session_id, caller_mode, seed_mode, seed_id, timestamp payload"
    - name: "_append_qa_audit_diff"
      field_type: "service"
      description: "serial_executor.py — NEW helper; appends unified-diff sections to chain-<session>-ac<N>-qa.original.diff in OUROBOROS_CHAIN_ARTIFACT_DIR; multi-replay accumulates"
    - name: "_replace_pm_qa_state / _finalize_pm_from_qa_outcome"
      field_type: "service"
      description: "serial_executor.py — NEW helpers for frozen-dataclass postmortem rebuild during resume QA-replay branch"
    - name: "Run Summary panel"
      field_type: "ui"
      description: "runner.py:~2114 — NEW Rich panel printed below the existing completion panel; always-show-5-row format; visible when compounding/inline_qa OR any non-zero stat"
    - name: "completion_summary"
      field_type: "data"
      description: "runner.py:2091 — extended with cost_usd, qa_calls, qa_verdicts, invariants_above_threshold, mode_conflicts; persisted via session_repo.mark_completed"
    - name: "--inline-qa, --max-qa-retries"
      field_type: "flag"
      description: "cli/commands/run.py — UNCHANGED flags; AC-4 item 1 fixes the warning gate to only fire on explicit override; AC-4 item 2 fixes the unconditional forward through runner"

evaluation_principles:
  - name: "backward_compatibility"
    description: "Parallel mode behavior remains byte-identical. Non-compounding non-inline-QA runs see the existing single completion panel. Old serialized chains hydrate cleanly under the new ACPostmortem schema. Old seed YAMLs (without execution_mode_required) hydrate as None and fall through to the global default."
  - name: "crash_resilience"
    description: "QA-pending sentinel + phase-1/phase-2 checkpoint mean a Ctrl+C during the QA call no longer forces an agent re-run on resume. The agent's already-committed work is preserved; only QA replays. Idempotent: multiple consecutive crashes still converge to a terminal state."
  - name: "audit_trail_preservation"
    description: "Every overwritten QA verdict is captured in the audit-diff sidecar. Multi-replay history accumulates as cumulative '### Replay N' sections. The live event stream uses supersede semantics (last verdict wins); the sidecar is the out-of-band audit record."
  - name: "soft_pass_safety"
    description: "Inherited from Q4 cycle-1: QA exhaustion never blocks the run. AC-3's resume-without-inline-qa edge case also soft-passes (qa_status=None, AC marked terminal without verdict)."
  - name: "user_experience"
    description: "End-of-run Run Summary panel surfaces cost, QA stats, invariants, and mode conflicts in one place. Always-show-5-row format makes the output grep/parse-friendly. Soft-flip deprecation warning + mode-conflict warning + replay-skipped warning are user-facing, not buried in DEBUG logs."
  - name: "graceful_degradation"
    description: "Audit-diff sidecar write failures degrade to a logged warning. Phase-1 checkpoint store unavailability degrades to status-quo (agent re-runs on resume). Mode_conflict event emit failures don't block the handler. AC-3 helpers (_replace_pm_qa_state, _finalize_pm_from_qa_outcome, _append_qa_audit_diff) are pure / idempotent — safe to call multiple times."
  - name: "test_coverage"
    description: "AC-1 adds 0 new tests (renames + adds docstring to existing). AC-2 adds ~11 unit tests. AC-3 adds ~17 unit + integration tests including 2 e2e crash-resume scenarios. AC-4 adds ~13 unit tests. Full suite stays green; expected ~5740 tests passing post-cycle (~5699 + ~41 new)."
  - name: "no_premature_optimization"
    description: "Module-level state for soft-flip and mode-conflict counters uses simple Python dicts/bools — no thread synchronization. Documented as benign-race acceptable. The audit-diff file uses simple file-append, no locking. These choices match the existing codebase's pragmatism."
  - name: "design_traceability"
    description: "Every architectural decision in this cycle traces back to a locked decision in docs/brainstorm/phase-2-q4.1-hardening-design.md. The design doc itself encodes P0/P1/interview findings. AC-1's docstring cites the design doc; AC-3's audit-diff design is sourced from the interview-derived deltas section."
  - name: "invariant_emission"
    description: "Each AC's final message emits at least one [[INVARIANT: ...]] tag so Q3's verifier can score the work on real output. Existing invariants from prior cycles are NOT regressed."

exit_conditions:
  - name: "all_four_acs_landed"
    description: "AC-1, AC-2, AC-3, AC-4 each produce one git commit with the conventional-commit prefix `feat(compounding): Q4.1 — ...` and `[[INVARIANT: ...]]` tags in the final message"
    evaluation_criteria: "git log shows 4 Q4.1 commits in order; each AC's tests pass; full test suite stays green between commits"
  - name: "no_regressions"
    description: "All Phase-1.5, Q2, Q3, Q4 invariants hold post-cycle"
    evaluation_criteria: "Existing 5699-test suite passes after each commit; no test renamed away from its current name except the AC-1 rename; chain artifact still renders diff_summary; resume still works for non-Q4.1 chains"
  - name: "design_doc_referenced"
    description: "AC-1's docstring at serial_executor.py:~1516 cites docs/brainstorm/phase-2-q4.1-hardening-design.md as the design source"
    evaluation_criteria: "rg finds the path reference in the codebase post-AC-1"
  - name: "audit_diff_format_verified"
    description: "AC-3's audit-diff sidecar produces unified-diff format that round-trips through `patch` (or equivalent) — the diff is structurally valid, not just visually plausible"
    evaluation_criteria: "test 49 passes (basic round-trip via difflib + patch semantics)"
  - name: "run_summary_panel_dogfood"
    description: "AC-4's Run Summary panel renders during the dogfood run itself with non-zero cost and qa_calls (since the run is --inline-qa)"
    evaluation_criteria: "Manual inspection of dogfood-run console output shows a cyan Run Summary panel with all 5 rows"

