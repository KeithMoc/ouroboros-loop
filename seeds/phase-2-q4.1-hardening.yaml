        def _replace_pm_qa_state(pm: ACPostmortem, *, qa_status: str | None) -> ACPostmortem:
            """Return a copy of `pm` with `qa_status` replaced. Frozen-dataclass-safe."""
            return ACPostmortem(
                summary=pm.summary, diff_summary=pm.diff_summary,
                tool_trace_digest=pm.tool_trace_digest, gotchas=pm.gotchas,
                qa_suggestions=pm.qa_suggestions,
                invariants_established=pm.invariants_established,
                retry_attempts=pm.retry_attempts, status=pm.status,
                duration_seconds=pm.duration_seconds,
                ac_native_session_id=pm.ac_native_session_id,
                sub_postmortems=pm.sub_postmortems,
                qa_verdict=pm.qa_verdict, qa_status=qa_status,
                qa_attempts=pm.qa_attempts, final_message=pm.final_message,
            )

        def _finalize_pm_from_qa_outcome(
            pm: ACPostmortem, outcome: InlineQAOutcome
        ) -> ACPostmortem:
            """Apply a fresh QA outcome to a pending postmortem, picking the
            terminal qa_status from outcome.loop_action."""
            qa_status = (
                "passed" if outcome.loop_action == "pass"
                else "skipped_delegated" if outcome.loop_action == "skipped_delegated"
                else "skipped_error" if outcome.loop_action == "skipped_error"
                else "exhausted"  # REVISE/FAIL on a single-shot replay
            )
            return ACPostmortem(
                summary=pm.summary, diff_summary=pm.diff_summary,
                tool_trace_digest=pm.tool_trace_digest, gotchas=pm.gotchas,
                qa_suggestions=pm.qa_suggestions,
                invariants_established=pm.invariants_established,
                retry_attempts=pm.retry_attempts, status=pm.status,
                duration_seconds=pm.duration_seconds,
                ac_native_session_id=pm.ac_native_session_id,
                sub_postmortems=pm.sub_postmortems,
                qa_verdict=outcome.verdict_dict,
                qa_status=qa_status,
                qa_attempts=pm.qa_attempts + 1,
                final_message=pm.final_message,
            )

        def _append_qa_audit_diff(
            *, chain_artifact_dir: Path, session_id: str, ac_index: int,
            original_verdict: dict[str, Any] | None,
            replay_verdict: dict[str, Any] | None,
        ) -> None:
            """Append a unified-diff section to the audit sidecar. Best-
            effort — write failures are logged, never raised."""
            import difflib, json
            from datetime import datetime, UTC
            try:
                target = (
                    chain_artifact_dir
                    / f"chain-{session_id}-ac{ac_index}-qa.original.diff"
                )
                target.parent.mkdir(parents=True, exist_ok=True)

                # Determine replay number: count existing "### Replay N" headers.
                existing = target.read_text() if target.exists() else ""
                replay_n = existing.count("### Replay ") + 1
                ts = datetime.now(UTC).strftime("%Y-%m-%d %H:%M")

                lhs = json.dumps(original_verdict or {}, indent=2, sort_keys=True).splitlines(keepends=True)
                rhs = json.dumps(replay_verdict or {}, indent=2, sort_keys=True).splitlines(keepends=True)
                fromfile = "original" if replay_n == 1 else f"original (post-replay-{replay_n - 1})"
                diff_lines = list(difflib.unified_diff(
                    lhs, rhs, fromfile=fromfile, tofile="replay", n=3,
                ))

                section = (
                    f"\n### Replay {replay_n} ({ts})\n"
                    + "".join(diff_lines)
                    + "\n"
                )
                with target.open("a") as f:
                    f.write(section)
            except Exception as exc:
                log.warning(
