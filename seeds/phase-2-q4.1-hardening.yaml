# Phase-2 Dogfood Seed — Q4.1: Hardening Cycle
#
# Four ACs.  Closes the workflow-assumption gotcha class (the Q2.1 / Q4×decomposition lesson)
# without expanding scope into a new feature surface:
#
#   AC-1 — Document the parent-only QA design choice (~10 LOC, docs-only).
#   AC-2 — MCP execution_mode_required honoring + soft-flip default (~50 LOC).
#   AC-3 — QA-pending sentinel resume + audit-diff sidecar (~125 LOC).
#   AC-4 — Deferred CodeRabbit items + Run Summary observability (~170 LOC).
#
# Total ~355 LOC across ~10 files. Q4 (PR #6, ce5ad1e) shipped inline QA at the parent-AC
# level; Q4.1 makes the QA story crash-resistant, the MCP mode-routing seed-aware, and
# adds a user-facing end-of-run surface that consolidates cost, QA, invariant, and
# mode-conflict telemetry.
#
# Run:
#   ooo run workflow seeds/phase-2-q4.1-hardening.yaml --compounding --inline-qa
#
# Full reasoning:
#   docs/brainstorm/phase-2-q4.1-hardening-design.md
#   docs/brainstorm/phase-2-q4-inline-qa-design.md (predecessor)
#   docs/brainstorm/serial-compounding-open-questions.md (master Q-list)
#
# Three-pass procedure trial: this is the FIRST cycle prepared via the
# P0-recon → brainstorm → P1-edge-case-mining → ooo-interview pipeline.
# The interview MCP tool errored mid-cycle (`No module named ouroboros.events.interview`),
# so the interview ran via Path B fallback. The procedure will be evaluated post-cycle —
# preliminary signal: each pass produced material design refinements.

goal: "Implement Q4.1 (hardening cycle for serial-compounding) for Ouroboros: (1) document the parent-only QA design choice as deliberate, with the substrate reasoning at the QA call site so future readers don't read it as a TODO; (2) honor `seed.metadata.execution_mode_required` in the MCP execute-seed handler with caller-wins-and-warn conflict policy and a soft-flip of the global default from `parallel` to `compounding` (one-time-per-session deprecation warning); (3) add a `qa_status='pending'` sentinel + phase-1/phase-2 checkpoint write so a Ctrl+C-during-QA crash on resume replays QA-only against the agent's already-committed work (no agent re-run), with an audit-diff sidecar capturing every overwritten verdict in unified-diff format; (4) ship the four PR-#6-deferred CodeRabbit items (max_qa_retries explicit-source detection, always-forward through runner, render suggestions outside fence, unify run_inline_qa serialization through _serialize_qa_verdict) plus extend completion_summary with cost / QA / invariant / mode-conflict counters and print a Run Summary panel below the existing completion panel (always-show-5-row format for grep/parse stability)."

constraints:
  - "Python 3.10+ (matches existing codebase)"
  - "Keep the full existing test suite green (`uv run pytest tests/unit/` after each AC's commit)"
  - "Parallel mode (`mode='parallel'`) must remain byte-identical to pre-change — parallel_executor.py is NOT touched"
  - "Non-compounding non-inline-QA runs must produce the SAME completion panel output as today (Run Summary panel only appears when applicable per AC-4)"
  - "ACPostmortem schema additions are forward-compatible: serialized chains from v0.30 (post-Q4) must hydrate cleanly under Q4.1; new fields default to None/empty via `d.get(...)` per the existing pattern"
  - "SeedMetadata schema addition is forward-compatible: old seed YAML files (without `execution_mode_required`) must hydrate as `None` and silently fall through to the global default; the 4 existing seed YAMLs that already have the field must START being honored"
  - "QA replay on resume MUST NOT re-execute the agent. The agent's prior commits are the artifact for replay; only `run_inline_qa` re-fires"
  - "Audit-diff sidecar writes MUST NOT block or fail the run. File-write errors degrade to a logged warning (`serial_executor.qa_audit_diff.write_failed`)"
  - "Use a conventional-commit message for each AC's commit (`feat(compounding): Q4.1 — <AC scope>`)"
  - "Before starting, read docs/brainstorm/phase-2-q4.1-hardening-design.md for the full design and locked decisions"
  - "Emit at least one [[INVARIANT: ...]] tag per AC's final message so Q3's verifier can score the work"
  - "Q1 was decided as 'parent-only QA + document'; AC-1 is documentation-only. Do NOT extend QA to sub-ACs in any AC of this cycle"
  - "End-of-run-sweep mode (`--qa-mode=defer`) is explicitly DEFERRED to Q4.2; do not implement here"
  - "Prompt-caching adapter rewrites are blocked by Claude Code subscription runtime constraint; do not propose them"
  - "MCP tool name shape preserved: `ouroboros_execute_seed` continues to accept `mode` arg as caller override; the new behavior is fallback-to-seed-metadata when caller omits, NOT replacement of the caller arg"

