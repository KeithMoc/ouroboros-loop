# Phase-2 Dogfood Seed — Q4: Inline QA in Serial-Compounding Mode
#
# Three ACs.  Wires QAHandler (mcp/tools/qa.py:397) into
# SerialCompoundingExecutor's per-AC body so each AC's claim is judged
# against its actual diff with an LLM verdict (pass | revise | fail).
# Recoverable verdicts trigger a budgeted retry loop with QA feedback
# injected into the next attempt's prompt.
#
# This is the second non-self-referential dogfood run.  Q2 (ccfc479)
# shipped per-AC diff capture; Q2.1 (4f0b044) hotfixed two bugs the
# unit suite missed but a real --compounding run surfaced.  The lesson
# from Q2.1 — design *with* the orchestrator's commit-per-AC pattern,
# not against it — is baked into AC-2's retry mechanics (add-on
# commits, pre_sha captured ONCE outside the retry loop) and into
# AC-3's mandatory end-to-end test.
#
# Run:
#   ooo run workflow seeds/phase-2-q4-inline-qa.yaml --compounding
#
# Full reasoning:
#   docs/brainstorm/phase-2-q4-inline-qa-design.md
#   docs/brainstorm/serial-compounding-open-questions.md (Q4 section)

goal: "Implement Q4 (inline QA in serial-compounding mode) for Ouroboros: per-AC, after diff_summary is captured and the postmortem is built, call QAHandler with the agent's final_message + diff_summary as `artifact` and the AC text + seed.goal as `quality_bar`. On REVISE/FAIL, re-execute the AC with QA feedback injected into context_override; pre_sha is captured ONCE per AC so the cumulative diff spans all attempts. Budget retries via a new --max-qa-retries flag (default 1, separate from --max-stall-retries). On budget exhaustion, soft-pass: keep the last attempt's postmortem with qa_status='exhausted' so a flaky LLM judge cannot nuke a long compounding chain. The whole feature is gated behind --inline-qa (default off — roughly doubles model cost per AC). Externally-satisfied ACs and failed/stalled executions skip QA entirely."

constraints:
  - "Python 3.10+ (matches existing codebase)"
  - "Keep the full existing test suite green (`uv run pytest tests/unit/` before committing each AC)"
  - "Parallel mode (`mode='parallel'`) must remain byte-identical to pre-change — parallel_executor.py and its tests are NOT touched"
  - "`--inline-qa` and `--max-qa-retries` are SerialCompoundingExecutor-only behavior; ParallelACExecutor must not see them"
  - "Inline QA NEVER blocks the run on retry exhaustion — always soft-pass with qa_status='exhausted' regardless of fail_fast.  fail_fast governs only execution failures, not QA verdicts."
  - "pre_sha (capture_pre_ac_snapshot) must be captured EXACTLY ONCE per AC, BEFORE the QA-retry loop. compute_diff_summary runs per attempt and naturally spans pre→HEAD, covering all retry commits per Q3=B add-on-commits design."
  - "QA is NEVER called when result.outcome != ACExecutionOutcome.SUCCEEDED. Failed/stalled ACs continue through the existing FAILED-path untouched."
  - "QA is NEVER called for externally-satisfied ACs (the line ~1186 path).  External-completed ACs skip the entire QA loop."
  - "QA is called PARENT-AC only on decomposed ACs.  Sub-postmortems are already aggregated into parent.sub_postmortems; do NOT run QA per sub-AC."
  - "If QAHandler.handle returns the opencode-mode plugin-dispatch shape (`status: 'delegated_to_subagent'` in meta — see qa.py:539-553), record qa_status='skipped_delegated' and break the retry loop. Do NOT treat this as PASS or FAIL."
  - "Phase-1.5 + Q2 invariants are NOT regressed: end-of-run chain artifact still written, sub-postmortems still flattened in prompts, invariant tags still verified by Haiku, per-AC checkpoint still written, resume still works, diff_summary still populated and rendered in the markdown artifact under each AC bullet."
  - "ACPostmortem is a frozen dataclass — adding fields preserves immutability semantics; rebuild via positional/keyword construction in the executor (matches existing pattern at serial_executor.py:1444)."
  - "ACExecutionOutcome enum is UNCHANGED — no new states.  qa_status lives on ACPostmortem only."
  - "Use `--inline-qa` outside `--compounding`: log a warning (`run.inline_qa.ignored_outside_compounding`) and ignore.  Same for `--max-qa-retries` without `--inline-qa`."
  - "Use a conventional-commit message for each AC's commit (`feat(compounding): Q4 — <AC scope>`)."
  - "Before starting, read docs/brainstorm/phase-2-q4-inline-qa-design.md for the full design and locked decisions."
  - "Emit at least one [[INVARIANT: ...]] tag per AC's final message so Q3's verifier can score the work."

