    GOTCHAS TO NOTE FOR FUTURE ACs:
    - [[INVARIANT: pre_sha (capture_pre_ac_snapshot) is called exactly once per AC, before the QA retry loop]]
    - [[INVARIANT: --inline-qa default is False — runs without the flag are byte-identical pre/post Q4]]
    - [[INVARIANT: QA exhaustion is soft-pass — the run never halts on QA verdict, only on execution failure]]
    - [[INVARIANT: opencode plugin-dispatch path terminates the QA retry loop after 1 call]]
    - [[INVARIANT: external_completed ACs and result.outcome != SUCCEEDED ACs skip the QA loop entirely]]

  - |
    AC-3 (Q4 / part 3) — Markdown chain artifact rendering + qa-evaluated event factory + e2e regression test

    Deliverable: the new postmortem fields are visible in the
    `chain-<session>.md` artifact, a structured event is emitted on
    every QA call, and an end-to-end test pins the commit-per-AC
    flow (the Q2.1 lesson made manifest).

    REQUIREMENTS:

    - In `_render_chain_as_markdown` (currently in serial_executor.py
      — search for the function that produces the chain artifact),
      add a `### QA` section per AC bullet, BELOW the existing
      `### Diff summary` block (added in PR #5).  Render only when
      `pm.qa_status is not None`.

      Format:

        ### QA
        - Status: {qa_status} (attempt {qa_attempts} of {max_attempts_seen})
        - Score: {qa_verdict.score:.2f} / 1.00 — {qa_verdict.verdict}
        {if qa_verdict.suggestions:}
        - Suggestions:
          - {sug[0]}
          - ...

      `{max_attempts_seen}` is the chain-level max(qa_attempts) — for
      first cycle, render `qa_attempts of qa_attempts` (always equal)
      to keep the renderer self-contained.

      DEFEND against backticks / pathological characters in suggestion
      text by using the same dynamic-fence selection PR #5 added to
      the diff_summary block.  (Find the existing
      `_pick_fence_for_text` or equivalent — if PR #5 inlined it, lift
      it into a small helper module-level function and reuse.)

      The `### QA` block is omitted entirely when `pm.qa_status is None`
      (the inline_qa-off case).

    - Add a new event factory in
      `src/ouroboros/orchestrator/events.py`:

        def create_ac_qa_evaluated_event(
            *,
            session_id: str,
            execution_id: str,
            ac_index: int,
            qa_attempt: int,
            score: float,
            verdict_label: str,
            loop_action: str,
            passed: bool,
        ) -> Event:
            ...

      Mirror `create_ac_postmortem_captured_event`'s shape exactly —
      same Event class, same envelope fields, payload keys at top level.
      Event name: `ac.qa.evaluated`.

      Export the factory from the module's `__all__` list.

    - Add unit tests in `tests/unit/orchestrator/test_events.py`:
       1. test_create_ac_qa_evaluated_event_payload_shape — the returned
          Event has type=`ac.qa.evaluated`, payload contains all 6
          arguments at top level, session_id/execution_id in envelope.
       2. test_create_ac_qa_evaluated_event_passed_false — passed=False
          for revise/fail loop_action; payload reflects.

    - Add a renderer test in test_serial_executor.py:
       test_render_chain_markdown_emits_qa_block_when_qa_status_set
       — build a chain with one AC whose pm.qa_status="passed" and
       qa_verdict={"score": 0.86, "verdict": "pass",
       "suggestions": ["use type hints"], ...}; render the chain;
       assert the markdown contains the `### QA` heading, the
       `Status: passed` line, the `Score: 0.86 / 1.00 — pass` line,
       and the suggestion bullet.

    - Add a renderer test:
       test_render_chain_markdown_omits_qa_block_when_qa_status_none —
       chain with one AC whose pm.qa_status=None; assert the rendered
       markdown does NOT contain `### QA` anywhere.

    - Add a renderer test:
       test_render_chain_markdown_qa_block_uses_dynamic_fence — chain
       with a suggestion containing 4 backticks (e.g.,
       "see ````block```` here"); assert the rendered markdown contains
       a fence with at least 5 backticks (or equivalent dynamic-fence
       behavior matching PR #5's diff_summary fence policy).

    - Add the END-TO-END regression test in test_serial_executor.py
      (this is the analogue of PR #5's
      test_diff_summary_flows_end_to_end_with_commit_per_ac):

       async def test_inline_qa_flows_end_to_end_with_commit_per_ac(
           tmp_path, monkeypatch, fake_adapter, ...
       ):
           '''Drive execute_serial with a real-ish commit-per-AC pattern.

           A fake adapter that:
             1. On the first AC attempt, modifies a file and commits it.
             2. On the second AC attempt (after QA REVISE), modifies a
                second file and commits it.
           A fake QAHandler that returns REVISE on attempt 1, PASS on
           attempt 2.

           Asserts:
             - run_inline_qa was called exactly 2 times for AC-1.
             - capture_pre_ac_snapshot was called exactly ONCE.
             - The final postmortem.qa_attempts == 2.
             - The final postmortem.qa_status == "passed".
             - The final postmortem.diff_summary contains BOTH file
               names (cumulative diff across the two commits).
             - The rendered chain markdown contains the `### QA` block
               with Status: passed (attempt 2 of 2).
             - The second _execute_single_ac call's context_override
               argument contains the substring "## QA verdict on previous
               attempt".
           '''

      The test should set up a real git repo in tmp_path (the same
      pattern PR #5's e2e test uses for diff_summary), use
      `monkeypatch.setenv("OUROBOROS_CHAIN_ARTIFACT_DIR", str(tmp_path))`,
      and verify the on-disk chain markdown via direct file read.

    - The full suite (`uv run pytest tests/unit/`) stays green;
      expect ~5660 tests passing post-cycle (current 5635 + ~25 new
      tests across the three ACs).

    GOTCHAS TO NOTE FOR FUTURE ACs:
    - [[INVARIANT: chain markdown render emits the QA block iff qa_status is not None]]
    - [[INVARIANT: ac.qa.evaluated event is emitted exactly once per QA call (one per attempt, not one per AC)]]
    - [[INVARIANT: e2e test test_inline_qa_flows_end_to_end_with_commit_per_ac is the regression net for the Q2.1 lesson — pre_sha-once + cumulative-diff under commit-per-AC]]

ontology_schema:
  name: "SerialCompoundingPhase2_Q4"
  description: "Narrowed ontology for the inline-QA work item"
  fields:
    - name: "QAHandler"
      field_type: "service"
      description: "Existing QA judge (mcp/tools/qa.py:397) — receives artifact + quality_bar + seed_content; returns MCPToolResult with structured verdict in meta"
    - name: "QAVerdict"
      field_type: "entity"
      description: "Parsed verdict (qa.py:85) — score, verdict, dimensions, differences, suggestions, reasoning"
    - name: "InlineQAOutcome"
      field_type: "entity"
      description: "New frozen dataclass in inline_qa.py — wraps loop_action, score, verdict_dict, qa_session_id"
    - name: "inline_qa_module"
      field_type: "module"
      description: "New src/ouroboros/orchestrator/inline_qa.py — helpers + run_inline_qa async entrypoint"
    - name: "ACPostmortem"
      field_type: "entity"
      description: "Existing per-AC postmortem (level_context.py:581) — gains qa_verdict, qa_status, qa_attempts fields"
    - name: "qa_verdict"
      field_type: "field"
      description: "dict[str,Any] | None on ACPostmortem — serialized last-attempt QAVerdict"
    - name: "qa_status"
      field_type: "field"
      description: "str | None on ACPostmortem — None | passed | exhausted | skipped_delegated"
    - name: "qa_attempts"
      field_type: "field"
      description: "int on ACPostmortem — count of QA evaluations performed for this AC"
    - name: "SerialCompoundingExecutor"
      field_type: "entity"
      description: "Existing per-AC orchestrator (serial_executor.py) — gains a QA-retry loop wrapping the per-AC body"
    - name: "execute_serial"
      field_type: "service"
      description: "Existing entrypoint (serial_executor.py:969) — gains inline_qa: bool and max_qa_retries: int kwargs"
    - name: "create_ac_qa_evaluated_event"
      field_type: "service"
      description: "New event factory in events.py — emitted per QA call, mirrors create_ac_postmortem_captured_event"
    - name: "_render_chain_as_markdown"
      field_type: "service"
      description: "Existing markdown renderer in serial_executor.py — gains a per-AC ### QA block when qa_status is not None"
    - name: "--inline-qa"
      field_type: "flag"
      description: "New CLI flag on `ooo run workflow` — gates per-AC QA in compounding mode"
    - name: "--max-qa-retries"
      field_type: "flag"
      description: "New CLI flag on `ooo run workflow` — budget for QA-judged retries (default 1, separate from stall counter)"

evaluation_principles:
  - name: "backward_compatibility"
    description: "Parallel mode behavior remains byte-identical. context_override=None path untouched. Runs without --inline-qa produce exactly the same chain artifact as pre-Q4 (qa_status field defaults to None, omitted from markdown render). All Phase-1.5 + Q2 invariants hold."
  - name: "soft_pass_safety"
    description: "QA exhaustion never blocks the run. A flaky LLM judge returning FAIL on every attempt produces qa_status='exhausted' on the postmortem; the chain still advances; result.outcome stays SUCCEEDED; the next AC executes normally."
  - name: "commit_per_ac_alignment"
    description: "pre_sha is captured ONCE per AC, BEFORE the QA-retry loop. The cumulative diff_summary spans pre_sha → HEAD across all retry attempts. The end-to-end test pins this behavior; PR #5's lesson is hardcoded into the test as a regression guard."
  - name: "graceful_degradation"
    description: "QAHandler returning Err, the opencode plugin-dispatch path returning delegated_to_subagent, and any unexpected meta shape all degrade to qa_status='skipped_delegated' without raising into the executor loop. Inline QA is best-effort, never a run-blocker."
  - name: "test_coverage"
    description: "AC-1 adds ~23 unit tests. AC-2 adds ~12 integration tests. AC-3 adds ~5 render/event/e2e tests. Full suite (`uv run pytest tests/unit/`) stays green; expect ~5660 tests passing."
  - name: "isolation"
    description: "inline_qa.py contains zero imports of SerialCompoundingExecutor — helpers stay unit-testable. ACExecutionOutcome enum is unchanged (no migrations)."
  - name: "invariant_emission"
    description: "Each AC's final message emits at least one [[INVARIANT: ...]] tag so Q3's Haiku verifier scores the work on real output."

