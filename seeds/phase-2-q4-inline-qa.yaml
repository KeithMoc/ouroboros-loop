        * `async def run_inline_qa(qa_handler: QAHandler, *, postmortem: ACPostmortem, ac_index: int, ac_content: str, seed: Seed, qa_session_id: str | None = None) -> InlineQAOutcome`
            - Composes a synthetic ACExecutionResult-shaped artifact-input
