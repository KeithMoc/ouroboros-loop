        * `_format_qa_feedback_section(verdict_dict: dict, attempt_number: int, max_attempts: int) -> str`
            Builds the prompt-injection block appended to the next
            retry attempt's context_override.  Format:

              "\n\n## QA verdict on previous attempt "
              "(attempt {attempt_number} of {max_attempts})\n\n"
              "Score: {score:.2f} / 1.00 — {verdict_label_upper}\n\n"
              "### Differences flagged\n"
