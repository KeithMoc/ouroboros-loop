    AC-2 (Q4 / part 2) — Wire into SerialCompoundingExecutor + CLI flags + integration tests

    Deliverable: `--inline-qa` and `--max-qa-retries` CLI flags drive a
    QA-retry loop in `execute_serial`.  AC-1's helpers become
    load-bearing; the executor calls `run_inline_qa` per AC and injects
    feedback into retries via `context_override`.

    REQUIREMENTS:

    - Add two new kwargs to `SerialCompoundingExecutor.execute_serial`
      (around serial_executor.py:969):
        inline_qa: bool = False,
        max_qa_retries: int = 1,
      (Both default-off / default-budget so untouched callers behave
      identically — AC-1's "no behavior change without --inline-qa"
      guarantee is preserved here.)

    - Wrap the per-AC body currently spanning serial_executor.py:1330
      (capture_pre_ac_snapshot) through :1391
      (_build_postmortem_from_result) in a QA-retry loop.  Pre-AC
      snapshot stays OUTSIDE the loop; the executor body inside the
      loop computes a fresh diff_summary per attempt but the same
      pre_sha is reused.  Pseudocode (full file diff applies — this is
      the canonical patch structure):

        pre_sha = ... (existing capture, untouched)

        qa_verdict_for_feedback: dict[str, Any] | None = None
        qa_attempts_used = 0
        final_postmortem: ACPostmortem | None = None

        for qa_attempt in range(max_qa_retries + 1):
            ctx_for_attempt = context_section
            if qa_verdict_for_feedback is not None:
                ctx_for_attempt = ctx_for_attempt + _format_qa_feedback_section(
                    qa_verdict_for_feedback,
                    attempt_number=qa_attempt + 1,
                    max_attempts=max_qa_retries + 1,
                )

            try:
                result = await self._execute_single_ac(
                    ...,  # all existing kwargs UNCHANGED except:
                    context_override=ctx_for_attempt,
                    retry_attempt=qa_attempt,
                )
            except Exception as exc:
                # Existing wrap UNCHANGED
                ...
                break  # don't QA-loop on hard execution failure

            try:
                diff_summary = compute_diff_summary(pre_sha, workspace_for_diff)
            except Exception as exc:
                ...
                diff_summary = ""

            postmortem = self._build_postmortem_from_result(
                result, workspace_root=self._task_cwd, diff_summary=diff_summary,
            )
            final_postmortem = postmortem

            # Skip QA on disabled flag, non-success, externally-satisfied
            if not inline_qa or result.outcome != ACExecutionOutcome.SUCCEEDED:
                break

            outcome = await run_inline_qa(
                self._qa_handler,
                postmortem=postmortem,
                ac_index=ac_index,
                ac_content=ac_content,
                seed=seed,
                qa_session_id=f"qa-ac{ac_index}-{session_id[:8]}-{qa_attempt}",
            )
            qa_attempts_used = qa_attempt + 1

            await self._safe_emit_event(
                create_ac_qa_evaluated_event(
                    session_id=session_id,
                    execution_id=execution_id,
                    ac_index=ac_index,
                    qa_attempt=qa_attempts_used,
                    score=outcome.score,
                    verdict_label=(outcome.verdict_dict or {}).get("verdict", ""),
                    loop_action=outcome.loop_action,
                    passed=(outcome.loop_action == "pass"),
                )
            )

            # Rebuild postmortem with QA verdict embedded
            final_postmortem = ACPostmortem(
                summary=postmortem.summary,
                diff_summary=postmortem.diff_summary,
                tool_trace_digest=postmortem.tool_trace_digest,
                gotchas=postmortem.gotchas,
                qa_suggestions=postmortem.qa_suggestions,
                invariants_established=postmortem.invariants_established,
                retry_attempts=postmortem.retry_attempts,
                status=postmortem.status,
                duration_seconds=postmortem.duration_seconds,
                ac_native_session_id=postmortem.ac_native_session_id,
                sub_postmortems=postmortem.sub_postmortems,
                qa_verdict=outcome.verdict_dict,
                qa_attempts=qa_attempts_used,
                qa_status=("passed" if outcome.loop_action == "pass"
                           else "skipped_delegated" if outcome.loop_action == "skipped_delegated"
                           else None),
            )

            if outcome.loop_action in ("pass", "skipped_delegated"):
                break

            qa_verdict_for_feedback = outcome.verdict_dict
            # Loop continues — next iteration injects feedback into ctx_for_attempt

        else:
            # Loop exhausted without break (REVISE/FAIL on every attempt)
            # Q4=B soft-pass: keep last attempt's postmortem, mark exhausted
            final_postmortem = ACPostmortem(
                summary=final_postmortem.summary,
                diff_summary=final_postmortem.diff_summary,
                tool_trace_digest=final_postmortem.tool_trace_digest,
                gotchas=final_postmortem.gotchas,
                qa_suggestions=final_postmortem.qa_suggestions,
                invariants_established=final_postmortem.invariants_established,
                retry_attempts=final_postmortem.retry_attempts,
                status=final_postmortem.status,
                duration_seconds=final_postmortem.duration_seconds,
                ac_native_session_id=final_postmortem.ac_native_session_id,
                sub_postmortems=final_postmortem.sub_postmortems,
                qa_verdict=qa_verdict_for_feedback,
                qa_attempts=qa_attempts_used,
                qa_status="exhausted",
            )

        # Existing invariant-extraction / chain-append code resumes here,
        # but reads from final_postmortem instead of `postmortem`.
        # Replace `postmortem` with `final_postmortem` in lines 1393-1503
        # (or refactor the variable name in that whole block).

    - The for/else construct above is intentional: if the loop runs to
      its natural end without `break`, the `else` block executes —
      that's the Q4=B soft-pass exhaustion path.  Python guarantees
      `else` runs only after no-break exit.

